name: CI - GoatUdder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  goat-service:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Goat Service CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: goat-service/package-lock.json

      - name: Install dependencies
        working-directory: goat-service
        run: npm ci

      - name: Lint
        working-directory: goat-service
        run: npm run lint

      - name: Tests
        working-directory: goat-service
        run: npm run test

      - name: Check coverage
        working-directory: goat-service
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Create Buildx builder
        run: |
          export BUILDKIT_HOST="tcp://buildkit.techops.tf:31234"
          docker buildx create --name remote-buildkit --driver remote || true
          docker buildx use remote-buildkit
          docker buildx inspect --bootstrap

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.techops.tf
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Test Harbor connectivity
        run: |
          echo "Testing connection to harbor.techops.tf:443"
          nc -vz harbor.techops.tf 443 || true
          curl -I https://harbor.techops.tf/v2/ || true

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          builder: remote-buildkit
          context: ./goat-service
          file: ./goat-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            harbor.techops.tf/goat-software/goat-udder-goat-service:latest
            harbor.techops.tf/goat-software/goat-udder-goat-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  rental-service:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Rental Service CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rental-service/package-lock.json

      - name: Install dependencies
        working-directory: rental-service
        run: npm ci

      - name: Lint
        working-directory: rental-service
        run: npm run lint

      - name: Tests
        working-directory: rental-service
        run: npm run test

      - name: Check coverage
        working-directory: rental-service
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Create Buildx builder
        run: |
          export BUILDKIT_HOST="tcp://buildkit.techops.tf:31234"
          docker buildx create --name remote-buildkit --driver remote || true
          docker buildx use remote-buildkit
          docker buildx inspect --bootstrap

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.techops.tf
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Test Harbor connectivity
        run: |
          echo "Testing connection to harbor.techops.tf:443"
          nc -vz harbor.techops.tf 443 || true
          curl -I https://harbor.techops.tf/v2/ || true

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          builder: remote-buildkit
          context: ./rental-service
          file: ./rental-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            harbor.techops.tf/goat-software/goat-udder-rental-service:latest
            harbor.techops.tf/goat-software/goat-udder-rental-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  frontend:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Frontend CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Buildx builder
        run: |
          export BUILDKIT_HOST="tcp://buildkit.techops.tf:31234"
          docker buildx create --name remote-buildkit --driver remote || true
          docker buildx use remote-buildkit
          docker buildx inspect --bootstrap

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.techops.tf
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Test Harbor connectivity
        run: |
          echo "Testing connection to harbor.techops.tf:443"
          nc -vz harbor.techops.tf 443 || true
          curl -I https://harbor.techops.tf/v2/ || true

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          builder: remote-buildkit
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            harbor.techops.tf/goat-software/goat-udder-frontend:latest
            harbor.techops.tf/goat-software/goat-udder-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  sonar-analysis:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: SonarQube Analysis
    needs: [goat-service, rental-service, frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
