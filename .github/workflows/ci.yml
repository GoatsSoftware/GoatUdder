name: CI - GoatUdder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-services:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: ${{ matrix.service.display-name }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: goat-service
            display-name: Goat Service CI
            image: goat-udder-goat-service
            coverage: goat-coverage

          - name: rental-service
            display-name: Rental Service CI
            image: goat-udder-rental-service
            coverage: rental-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service.name }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.name }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.service.name }}
        run: npm run lint

      - name: Tests
        working-directory: ${{ matrix.service.name }}
        run: npm run test

      - name: Coverage
        working-directory: ${{ matrix.service.name }}
        run: |
          npx jest \
            --coverage \
            --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}' \
            --coverageReporters=lcov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.coverage }}
          path: ${{ matrix.service.name }}/coverage/lcov.info

      - name: Create Buildx builder
        run: |
          export BUILDKIT_HOST="tcp://buildkit.techops.tf:31234"
          docker buildx create --name remote-buildkit --driver remote || true
          docker buildx use remote-buildkit
          docker buildx inspect --bootstrap

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.techops.tf
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Test Harbor connectivity
        run: |
          echo "Testing connection to harbor.techops.tf:443"
          nc -vz harbor.techops.tf 443 || true
          curl -I https://harbor.techops.tf/v2/ || true

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          builder: remote-buildkit
          context: ./${{ matrix.service.name }}
          file: ./${{ matrix.service.name }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            harbor.techops.tf/goat-software/${{ matrix.service.image }}:latest
            harbor.techops.tf/goat-software/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Get image reference
        run: |
          echo "IMAGE_REF=harbor.techops.tf/goat-software/${{ matrix.service.image }}@${{ steps.push.outputs.digest }}" >> $GITHUB_ENV

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          sudo mv ./bin/syft /usr/local/bin/syft
          syft version

      - name: Generate SBOM
        run: |
          syft $IMAGE_REF -o spdx-json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-sbom
          path: sbom.json

      - name: Scan vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          severity: CRITICAL
          exit-code: "0"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: report.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key

          cosign sign \
            --yes \
            --key cosign.key \
            --tlog-upload=false \
            $IMAGE_REF

          rm -f cosign.key

  frontend:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Frontend CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Buildx builder
        run: |
          export BUILDKIT_HOST="tcp://buildkit.techops.tf:31234"
          docker buildx create --name remote-buildkit --driver remote || true
          docker buildx use remote-buildkit
          docker buildx inspect --bootstrap

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.techops.tf
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Test Harbor connectivity
        run: |
          nc -vz harbor.techops.tf 443 || true
          curl -I https://harbor.techops.tf/v2/ || true

      # BUILD + PUSH FIRST (comme backend)
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          builder: remote-buildkit
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            harbor.techops.tf/goat-software/goat-udder-frontend:latest
            harbor.techops.tf/goat-software/goat-udder-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Get image reference
        run: |
          echo "IMAGE_REF=harbor.techops.tf/goat-software/goat-udder-frontend@${{ steps.push.outputs.digest }}" >> $GITHUB_ENV

      # SYFT CLEAN (comme backend)
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          sudo mv ./bin/syft /usr/local/bin/syft
          syft version

      - name: Generate SBOM
        run: |
          syft $IMAGE_REF -o spdx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: sbom.json

      # TRIVY CLEAN (comme backend)
      - name: Scan vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          severity: CRITICAL
          exit-code: "0"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key

          cosign sign \
            --yes \
            --key cosign.key \
            --tlog-upload=false \
            $IMAGE_REF

          rm -f cosign.key

  sonar-analysis:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: SonarQube Analysis
    needs:
      - backend-services
      - frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download goat coverage
        uses: actions/download-artifact@v4
        with:
          name: goat-coverage
          path: goat-service/coverage

      - name: Download rental coverage
        uses: actions/download-artifact@v4
        with:
          name: rental-coverage
          path: rental-service/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
