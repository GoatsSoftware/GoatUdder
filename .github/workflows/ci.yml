name: CI - GoatUdder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  goat-service:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Goat Service CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: goat-service/package-lock.json

      - name: Install dependencies
        working-directory: goat-service
        run: npm ci

      - name: Lint
        working-directory: goat-service
        run: npm run lint

      - name: Tests
        working-directory: goat-service
        run: npm run test

      - name: Check coverage
        working-directory: goat-service
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Build Docker image
        working-directory: goat-service
        run: docker build -t goat-service .

  rental-service:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Rental Service CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rental-service/package-lock.json

      - name: Install dependencies
        working-directory: rental-service
        run: npm ci

      - name: Lint
        working-directory: rental-service
        run: npm run lint

      - name: Tests
        working-directory: rental-service
        run: npm run test

      - name: Check coverage
        working-directory: rental-service
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Build Docker image
        working-directory: rental-service
        run: docker build -t rental-service .
    
  frontend:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: Frontend CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        working-directory: frontend
        run: docker build -t frontend .

  sonar-analysis:
    runs-on: github-runner-scale-set-goatsoft-udder
    name: SonarQube Analysis
    needs: [goat-service, rental-service, frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}