name: CI Pipeline - GoatUdder

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-api:
    name: Test GoatUdder-API
    runs-on: github-runner-scale-set-goatsoft-udder
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: goat-udder-api/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: goat-udder-api

      - name: Run unit tests
        run: npm test
        working-directory: goat-udder-api

      - name: Run API mock tests
        run: npm run test:api
        working-directory: goat-udder-api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: goat-udder-api/coverage/

  test-booking:
    name: Test GoatUdder-Booking
    runs-on: github-runner-scale-set-goatsoft-udder
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: goat-udder-booking/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: goat-udder-booking

      - name: Run unit tests
        run: npm test
        working-directory: goat-udder-booking

      - name: Run API mock tests
        run: npm run test:api
        working-directory: goat-udder-booking

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: booking-coverage
          path: goat-udder-booking/coverage/

  docker-build:
    name: Docker Build Verification
    runs-on: github-runner-scale-set-goatsoft-udder
    needs: [test-api, test-booking]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build GoatUdder-API image
        run: docker build -t goatudder-api:test ./goat-udder-api

      - name: Build GoatUdder-Booking image
        run: docker build -t goatudder-booking:test ./goat-udder-booking

      - name: Verify docker-compose
        run: docker compose config